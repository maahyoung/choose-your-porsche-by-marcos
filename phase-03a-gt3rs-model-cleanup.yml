name: Phase 03A GT3 RS model cleanup

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  cleanup-model:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Apply GT3 RS lighting cleanup
        shell: bash
        env:
          PORSCHE_COMPONENT_B64: 
        run: |
          set -euo pipefail

          test -f src/components/experience/PorscheGT3RS.tsx
          printf '%s' "$PORSCHE_COMPONENT_B64" | base64 --decode > src/components/experience/PorscheGT3RS.tsx

      - name: Install dependencies
        run: npm ci --registry=https://registry.npmjs.org/

      - name: Validate project
        run: |
          npm run lint
          npm run build

      - name: Commit and publish cleanup
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add src/components/experience/PorscheGT3RS.tsx

          if git diff --cached --quiet; then
            echo "Phase 03A changes are already applied."
            exit 0
          fi

          git commit -m "Fix GT3 RS lighting materials and signals"
          git push
