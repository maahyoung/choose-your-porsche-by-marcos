name: Unpack project

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  unpack:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Extract project
        shell: bash
        run: |
          set -euo pipefail

          ZIP_FILE="choose-your-porsche-by-marcos-phase-01.zip"
          TEMP_DIR="$(mktemp -d)"

          test -f "$ZIP_FILE"
          unzip -q "$ZIP_FILE" -d "$TEMP_DIR"
          test -d "$TEMP_DIR/choose-your-porsche-by-marcos"

          rsync -a \
            "$TEMP_DIR/choose-your-porsche-by-marcos/" \
            ./

          rm -f "$ZIP_FILE"
          rm -rf "$TEMP_DIR"

      - name: Commit project files
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email \
            "41898282+github-actions[bot]@users.noreply.github.com"

          git add -A

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "Initialize Choose Your Porsche project"
          git push
