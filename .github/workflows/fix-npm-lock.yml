name: Fix npm lockfile

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix-lockfile:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Regenerate public npm lockfile
        shell: bash
        run: |
          set -euo pipefail

          rm -f package-lock.json

          printf 'registry=https://registry.npmjs.org/\n' > .npmrc

          npm pkg set engines.node="22.x"

          npm install \
            --package-lock-only \
            --ignore-scripts \
            --registry=https://registry.npmjs.org/

          if grep -q "applied-caas-gateway" package-lock.json; then
            echo "Internal registry remains in package-lock.json"
            exit 1
          fi

      - name: Commit corrected files
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email \
            "41898282+github-actions[bot]@users.noreply.github.com"

          git add package.json package-lock.json .npmrc

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "Fix npm registry for Vercel"
          git push
