name: Phase 02A visual overhaul

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/workflows/phase-02a-visual-overhaul.yml"

permissions:
  contents: write

jobs:
  visual-overhaul:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Apply Phase 02A
        shell: bash
        run: |
          set -euo pipefail
          echo '' | base64 --decode > /tmp/phase-02a.tar.gz
          tar -xzf /tmp/phase-02a.tar.gz -C .

      - name: Install dependencies
        run: npm ci --registry=https://registry.npmjs.org/

      - name: Validate project
        run: |
          npm run lint
          npm run build

      - name: Commit and publish Phase 02A
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/components/experience/CarScene.tsx \
                  src/components/experience/SpeedLights.tsx \
                  src/components/ui/SummaryOverlay.tsx \
                  src/components/experience/CarPrototype.tsx \
                  src/components/experience/ConfiguratorExperience.tsx \
                  src/app/globals.css
          if git diff --cached --quiet; then
            echo "Phase 02A is already applied."
            exit 0
          fi
          git commit -m "Apply Phase 02A visual overhaul"
          git push
